<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent-0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 13px;
    overflow: hidden;
    user-select: none;
  }

  /* Tab Navigation */
  .tabs {
    display: flex;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    color: #8890a0;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: #e0e0e0; }
  .tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }

  /* Tab Content */
  .tab-content { display: none; height: calc(100vh - 36px); }
  .tab-content.active { display: flex; flex-direction: column; }

  /* ─── Dashboard Tab ─── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
  }
  .status-dot.offline { background: #ff4444; }
  .status-dot.processing { background: #ffaa00; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .status-text { font-size: 11px; color: #8890a0; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 10px 12px;
    background: #16213e;
  }
  .stat-box {
    text-align: center;
    padding: 6px;
    background: #1a1a2e;
    border-radius: 4px;
    border: 1px solid #0f3460;
  }
  .stat-value { font-size: 18px; font-weight: bold; color: #00d4ff; }
  .stat-label { font-size: 10px; color: #8890a0; margin-top: 2px; }

  /* Alerts */
  .alerts {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .alert {
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 4px;
    border-left: 3px solid;
    background: #16213e;
    font-size: 12px;
  }
  .alert.high { border-color: #ff4444; }
  .alert.medium { border-color: #ffaa00; }
  .alert.low { border-color: #00d4ff; }
  .alert-type { font-size: 10px; color: #8890a0; margin-bottom: 2px; }

  /* ─── Query Tab ─── */
  .query-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .query-message {
    margin-bottom: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .query-message.user {
    background: #0f3460;
    margin-left: 20px;
  }
  .query-message.agent {
    background: #16213e;
    margin-right: 20px;
    border: 1px solid #0f3460;
  }

  .query-input-area {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    background: #16213e;
    border-top: 1px solid #0f3460;
  }
  .query-input {
    flex: 1;
    padding: 8px 10px;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 12px;
    outline: none;
  }
  .query-input:focus { border-color: #00d4ff; }
  .query-btn {
    padding: 8px 16px;
    background: #00d4ff;
    color: #1a1a2e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
  }
  .query-btn:hover { background: #00b8d4; }
  .query-btn:disabled { background: #555; cursor: not-allowed; }

  /* ─── Settings Tab ─── */
  .settings {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }
  .settings h3 {
    color: #00d4ff;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .setting-group {
    margin-bottom: 16px;
  }
  .setting-row {
    display: flex;
    flex-direction: column;
    margin-bottom: 10px;
  }
  .setting-label {
    font-size: 11px;
    color: #8890a0;
    margin-bottom: 4px;
  }
  .setting-input, .setting-select {
    padding: 6px 8px;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 12px;
    outline: none;
  }
  .setting-input:focus, .setting-select:focus { border-color: #00d4ff; }
  .save-btn {
    padding: 8px 20px;
    background: #00ff88;
    color: #1a1a2e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
    margin-top: 8px;
  }
  .save-btn:hover { background: #00cc6a; }
  .save-msg {
    font-size: 11px;
    color: #00ff88;
    margin-top: 6px;
    display: none;
  }

  /* Activity items */
  .activity-item {
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 4px;
    border-left: 3px solid #0f3460;
    background: #16213e;
    font-size: 12px;
  }
  .activity-item.change { border-color: #00d4ff; }
  .activity-item.alert { border-color: #ffaa00; }
  .activity-item.query { border-color: #00ff88; }
  .activity-item.onboarding { border-color: #aa66ff; }
  .activity-item.session { border-color: #ff6688; }
  .activity-type {
    font-size: 10px;
    color: #8890a0;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
  .activity-detail {
    color: #ccc;
    line-height: 1.4;
  }

  /* Knowledge files */
  .knowledge-file {
    padding: 8px 10px;
    margin-bottom: 4px;
    border-radius: 4px;
    background: #16213e;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid transparent;
  }
  .knowledge-file:hover { border-color: #0f3460; }
  .knowledge-file .kf-name { font-size: 12px; color: #00d4ff; }
  .knowledge-file .kf-size { font-size: 10px; color: #8890a0; }
  .knowledge-content {
    padding: 10px;
    background: #111;
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 300px;
    overflow-y: auto;
    color: #ccc;
    border: 1px solid #0f3460;
  }
  .back-btn {
    padding: 4px 10px;
    background: #0f3460;
    color: #e0e0e0;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    margin-bottom: 8px;
  }
  .back-btn:hover { background: #1a4a8a; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1a1a2e; }
  ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }
</style>
</head>
<body>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="switchTab('query')">Query</div>
  <div class="tab" onclick="switchTab('knowledge')">Knowledge</div>
  <div class="tab" onclick="switchTab('settings')">Settings</div>
</div>

<!-- Dashboard Tab -->
<div id="tab-dashboard" class="tab-content active">
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Connecting...</span>
    <span style="margin-left:auto; font-size:11px; color:#00d4ff;" id="projectName">--</span>
  </div>
  <div style="padding:4px 12px; background:#111; font-size:10px; color:#8890a0; border-bottom:1px solid #0f3460;">
    <div>Project: <span id="infoProjectPath" style="color:#ccc;">--</span></div>
    <div>Knowledge: <span id="infoKnowledgePath" style="color:#ccc;">--</span></div>
    <div>Model: <span id="infoModel" style="color:#ccc;">--</span></div>
  </div>
  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="statChanges">0</div>
      <div class="stat-label">Changes</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statGospels">0</div>
      <div class="stat-label">Gospels</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statAlerts">0</div>
      <div class="stat-label">Alerts</div>
    </div>
  </div>
  <div class="alerts" id="activityContainer">
    <div style="text-align:center; color:#555; padding:20px;">Loading activity...</div>
  </div>
</div>

<!-- Knowledge Tab -->
<div id="tab-knowledge" class="tab-content">
  <div style="padding:8px 12px; background:#16213e; border-bottom:1px solid #0f3460; font-size:12px; color:#00d4ff;">
    Knowledge Files
  </div>
  <div class="alerts" id="knowledgeContainer">
    <div style="text-align:center; color:#555; padding:20px;">Loading...</div>
  </div>
</div>

<!-- Query Tab -->
<div id="tab-query" class="tab-content">
  <div class="query-area" id="queryArea">
    <div class="query-message agent">Agent-0 ready. Ask me anything about the project.</div>
  </div>
  <div class="query-input-area">
    <input type="text" class="query-input" id="queryInput"
           placeholder="Ask Agent-0..."
           onkeydown="if(event.key==='Enter')sendQuery()">
    <button class="query-btn" id="queryBtn" onclick="sendQuery()">Ask</button>
  </div>
</div>

<!-- Settings Tab -->
<div id="tab-settings" class="tab-content">
  <div class="settings">
    <h3>LLM Provider</h3>
    <div class="setting-group">
      <div class="setting-row">
        <label class="setting-label">Provider</label>
        <select class="setting-select" id="settingProvider">
          <option value="google">Google Gemini</option>
          <option value="anthropic">Anthropic Claude</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>
      <div class="setting-row">
        <label class="setting-label">Model</label>
        <input type="text" class="setting-input" id="settingModel" value="gemini-2.5-flash">
      </div>
      <div class="setting-row">
        <label class="setting-label">API Key</label>
        <input type="password" class="setting-input" id="settingApiKey" placeholder="Enter your API key...">
      </div>
    </div>

    <h3>Embeddings</h3>
    <div class="setting-group">
      <div class="setting-row">
        <label class="setting-label">Embedding Model</label>
        <input type="text" class="setting-input" id="settingEmbedModel" value="gemini-embedding-001">
      </div>
      <div class="setting-row">
        <label class="setting-label">Embedding API Key (leave empty to use LLM key)</label>
        <input type="password" class="setting-input" id="settingEmbedKey" placeholder="Same as LLM key if empty">
      </div>
    </div>

    <h3>Connect to Project</h3>
    <div class="setting-group" style="background:#111; padding:10px; border-radius:6px; border:1px solid #0f3460;">
      <div class="setting-row" style="margin-bottom:8px;">
        <label class="setting-label">Project Folder</label>
        <div style="display:flex; gap:6px;">
          <input type="text" class="setting-input" id="settingProjectPath"
                 placeholder="Click Browse to select a folder"
                 style="flex:1; font-size:13px; padding:10px; border:2px solid #0f3460;">
          <button onclick="chooseFolder()"
                  style="padding:10px 16px; background:#0f3460; color:#00d4ff; border:1px solid #00d4ff; border-radius:4px; cursor:pointer; font-weight:bold; font-size:13px; white-space:nowrap;">
            Browse
          </button>
        </div>
      </div>
      <button onclick="switchProject()"
              style="width:100%; padding:12px; background:#00d4ff; color:#1a1a2e; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px;">
        Connect Agent-0 to this folder
      </button>
      <div id="switchMsg" style="font-size:12px; color:#ffaa00; margin-top:8px; display:none;"></div>
    </div>
      <div class="setting-row">
        <label class="setting-label">Strictness Mode</label>
        <select class="setting-select" id="settingStrictness">
          <option value="strict">Strict</option>
          <option value="normal" selected>Normal</option>
          <option value="loose">Loose</option>
        </select>
      </div>
    </div>

    <h3>Watcher</h3>
    <div class="setting-group">
      <div class="setting-row">
        <label class="setting-label">Debounce (seconds)</label>
        <input type="number" class="setting-input" id="settingDebounce" value="5" min="1" max="30">
      </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    <div class="save-msg" id="saveMsg">Settings saved!</div>
  </div>
</div>

<script>
// Auto-detect API port from URL, or default to 7800
const API_BASE = window.location.port ? ('http://127.0.0.1:' + window.location.port) : 'http://127.0.0.1:7800';
let pollInterval = null;

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'query') {
    document.getElementById('queryInput').focus();
  }
  if (name === 'knowledge') {
    fetchKnowledge();
  }
}

// Fetch health/status
async function fetchHealth() {
  try {
    const res = await fetch(API_BASE + '/health');
    const data = await res.json();
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = 'Watching - ' + data.strictness;
    document.getElementById('projectName').textContent = data.project || '--';
    document.getElementById('infoProjectPath').textContent = data.project_path || '--';
    document.getElementById('infoKnowledgePath').textContent = data.knowledge_dir || '--';
    document.getElementById('infoModel').textContent = (data.provider || '') + ' / ' + (data.model || '');
    return true;
  } catch (e) {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = 'Offline';
    return false;
  }
}

// Fetch activity feed
async function fetchActivity() {
  try {
    const res = await fetch(API_BASE + '/feed');
    const data = await res.json();
    const container = document.getElementById('activityContainer');

    if (data.activity && data.activity.length > 0) {
      container.innerHTML = '';
      let alertCount = 0;
      let changeCount = 0;
      data.activity.forEach(item => {
        if (item.type === 'alert') alertCount++;
        if (item.type === 'change') changeCount++;
        const div = document.createElement('div');
        div.className = 'activity-item ' + (item.type || '') + (item.category ? ' ' + item.category : '');

        let label = item.type || '?';
        if (item.category && item.category !== 'query') label += ' [' + item.category + ']';

        div.innerHTML = '<div class="activity-type">' + label + ' - ' + (item.time || '').substring(0, 16) + '</div>' +
                        '<div class="activity-detail">' + (item.detail || '').substring(0, 200) + '</div>';
        container.appendChild(div);
      });
      document.getElementById('statAlerts').textContent = alertCount;
      document.getElementById('statChanges').textContent = changeCount;
    } else {
      container.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">No activity yet. Try asking a question or making a file change.</div>';
    }
  } catch (e) {
    document.getElementById('activityContainer').innerHTML = '<div style="text-align:center; color:#ff4444; padding:20px;">Cannot reach Agent-0 backend</div>';
  }
}

// Fetch alerts (for count)
async function fetchAlerts() {
  try {
    const res = await fetch(API_BASE + '/alerts');
    const data = await res.json();
    if (data.alerts) {
      document.getElementById('statAlerts').textContent = data.alerts.length;
    }
  } catch (e) {}
}

// Update stats from feed data
function updateStatsFromFeed(items) {
  let changes = 0, alerts = 0;
  items.forEach(i => {
    if (i.type === 'change') changes++;
    if (i.type === 'alert') alerts++;
  });
  document.getElementById('statChanges').textContent = changes;
  document.getElementById('statAlerts').textContent = alerts;
}

// Fetch gospels count
async function fetchGospels() {
  try {
    const res = await fetch(API_BASE + '/gospels');
    const data = await res.json();
    document.getElementById('statGospels').textContent = (data.gospels || []).length;
  } catch (e) {}
}

// Send query
async function sendQuery() {
  const input = document.getElementById('queryInput');
  const question = input.value.trim();
  if (!question) return;

  const area = document.getElementById('queryArea');
  const btn = document.getElementById('queryBtn');

  // Add user message
  const userMsg = document.createElement('div');
  userMsg.className = 'query-message user';
  userMsg.textContent = question;
  area.appendChild(userMsg);

  input.value = '';
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch(API_BASE + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();

    const agentMsg = document.createElement('div');
    agentMsg.className = 'query-message agent';
    agentMsg.textContent = data.answer || 'No response.';
    area.appendChild(agentMsg);
  } catch (e) {
    const errMsg = document.createElement('div');
    errMsg.className = 'query-message agent';
    errMsg.textContent = 'Error: Could not reach Agent-0.';
    area.appendChild(errMsg);
  }

  btn.disabled = false;
  btn.textContent = 'Ask';
  area.scrollTop = area.scrollHeight;
}

// Open native folder picker via Tauri dialog plugin
async function chooseFolder() {
  // Check if Tauri is available
  if (window.__TAURI__) {
    try {
      const { open } = window.__TAURI__.dialog || await import('https://unpkg.com/@tauri-apps/plugin-dialog/dist/index.mjs');
      const selected = await open({ directory: true, multiple: false, title: 'Select Project Folder' });
      if (selected) {
        document.getElementById('settingProjectPath').value = selected;
      }
      return;
    } catch (e) {
      console.log('Tauri dialog failed:', e);
    }
  }
  // Fallback for browser
  const path = prompt('Enter the full project folder path:');
  if (path) document.getElementById('settingProjectPath').value = path.trim();
}

// Save settings
async function saveSettings() {
  const settings = {
    provider: document.getElementById('settingProvider').value,
    model: document.getElementById('settingModel').value,
    api_key: document.getElementById('settingApiKey').value,
    embed_model: document.getElementById('settingEmbedModel').value,
    embed_key: document.getElementById('settingEmbedKey').value,
    strictness: document.getElementById('settingStrictness').value,
    debounce: parseInt(document.getElementById('settingDebounce').value),
    project_path: document.getElementById('settingProjectPath').value
  };

  try {
    // Save via pywebview API if available, otherwise via Flask
    if (window.pywebview && window.pywebview.api) {
      await window.pywebview.api.save_settings(JSON.stringify(settings));
    } else {
      await fetch(API_BASE + '/config/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(settings)
      });
    }

    const msg = document.getElementById('saveMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
  } catch (e) {
    alert('Error saving settings: ' + e.message);
  }
}

// Load settings from backend
async function loadSettingsFromAPI() {
  try {
    const res = await fetch(API_BASE + '/config');
    const data = await res.json();
    if (data.llm) {
      document.getElementById('settingProvider').value = data.llm.provider || 'google';
      document.getElementById('settingModel').value = data.llm.model || 'gemini-2.5-flash';
    }
    if (data.embeddings) {
      document.getElementById('settingEmbedModel').value = data.embeddings.model || 'gemini-embedding-001';
    }
    if (data.agent) {
      document.getElementById('settingStrictness').value = data.agent.strictness || 'normal';
    }
    if (data.watcher) {
      document.getElementById('settingDebounce').value = data.watcher.debounce_seconds || 5;
    }
    if (data.project_path) {
      document.getElementById('settingProjectPath').value = data.project_path;
    }
  } catch (e) {}
}

// Fetch knowledge files list
async function fetchKnowledge() {
  try {
    const res = await fetch(API_BASE + '/knowledge');
    const data = await res.json();
    const container = document.getElementById('knowledgeContainer');

    if (data.files && data.files.length > 0) {
      container.innerHTML = '';
      data.files.forEach(f => {
        const div = document.createElement('div');
        div.className = 'knowledge-file';
        const sizeKB = (f.size / 1024).toFixed(1);
        div.innerHTML = '<span class="kf-name">' + f.path + '</span><span class="kf-size">' + sizeKB + ' KB</span>';
        div.onclick = () => viewKnowledgeFile(f.path);
        container.appendChild(div);
      });
    } else {
      container.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">No knowledge files yet. Run onboarding first.</div>';
    }
  } catch (e) {
    document.getElementById('knowledgeContainer').innerHTML = '<div style="text-align:center; color:#ff4444; padding:20px;">Cannot reach backend</div>';
  }
}

// View a specific knowledge file
async function viewKnowledgeFile(path) {
  try {
    const res = await fetch(API_BASE + '/knowledge?file=' + encodeURIComponent(path));
    const data = await res.json();
    const container = document.getElementById('knowledgeContainer');

    container.innerHTML = '';

    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.textContent = 'Back to files';
    backBtn.onclick = fetchKnowledge;
    container.appendChild(backBtn);

    const title = document.createElement('div');
    title.style.cssText = 'font-size:12px; color:#00d4ff; margin-bottom:6px; font-weight:bold;';
    title.textContent = path;
    container.appendChild(title);

    const content = document.createElement('div');
    content.className = 'knowledge-content';
    content.textContent = data.content || 'Empty file';
    container.appendChild(content);
  } catch (e) {
    alert('Error loading file: ' + e.message);
  }
}

// Fetch real stats from DB
async function fetchStats() {
  try {
    const res = await fetch(API_BASE + '/stats');
    const data = await res.json();
    document.getElementById('statChanges').textContent = data.changes || 0;
    document.getElementById('statGospels').textContent = data.gospels || 0;
    document.getElementById('statAlerts').textContent = data.alerts || 0;
  } catch (e) {}
}

// Poll for updates
function startPolling() {
  fetchHealth();
  fetchActivity();
  fetchStats();
  fetchKnowledge();
  pollInterval = setInterval(() => {
    fetchHealth();
    fetchActivity();
    fetchStats();
  }, 5000);
}

// Switch to a different project
async function switchProject() {
  const newPath = document.getElementById('settingProjectPath').value.trim();
  if (!newPath) {
    alert('Enter a project path first.');
    return;
  }

  const msg = document.getElementById('switchMsg');
  msg.style.display = 'block';
  msg.textContent = 'Restarting Agent-0 with new project...';

  try {
    const res = await fetch(API_BASE + '/restart', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({project_path: newPath})
    });
    const data = await res.json();

    if (data.error) {
      msg.textContent = 'Error: ' + data.error;
      msg.style.color = '#ff4444';
      return;
    }

    msg.textContent = 'Restarting... reconnecting in 8 seconds...';
    msg.style.color = '#00ff88';

    // Wait for the new backend to start, then reload
    setTimeout(() => {
      msg.textContent = 'Reconnecting...';
      checkAndReload();
    }, 8000);
  } catch (e) {
    msg.textContent = 'Backend unreachable. It may be restarting...';
    msg.style.color = '#ffaa00';
    setTimeout(() => checkAndReload(), 5000);
  }
}

function checkAndReload() {
  const msg = document.getElementById('switchMsg');
  let attempts = 0;

  function tryConnect() {
    attempts++;
    fetch(API_BASE + '/health')
      .then(r => {
        if (r.ok) {
          msg.textContent = 'Connected! Reloading...';
          setTimeout(() => window.location.reload(), 1000);
        } else {
          retry();
        }
      })
      .catch(() => retry());
  }

  function retry() {
    if (attempts < 15) {
      msg.textContent = 'Waiting for backend... (' + attempts + ')';
      setTimeout(tryConnect, 2000);
    } else {
      msg.textContent = 'Could not reconnect. Restart Agent-0 manually.';
      msg.style.color = '#ff4444';
    }
  }

  tryConnect();
}

// Init
window.addEventListener('load', () => {
  loadSettingsFromAPI();
  startPolling();
});
</script>
